    body {

    /* CSS ปรับแต่งพิเศษเพื่อให้เห็นภาพเต็ม */

      object-fit: contain; /* แสดงภาพเต็ม ไม่โดนครอบ */
      width: 100%; /* ขยายเต็มพื้นที่ Div ครอบ */

      border-radius: 50%; /* ตัดขอบรูปเป็นวงกลมเพื่อให้เข้ากับ Spin */

</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen m-0 p-0 select-none">

  <!-- Loading & Welcome UI Container -->
  <div id="app-container" class="text-center p-8 bg-white rounded-3xl shadow-xl max-w-sm w-full mx-4 border border-gray-100 z-50 transition-all duration-500">

    <!-- ส่วนแสดงผลรูปภาพ (ปรับเปลี่ยนได้ระหว่าง Logo กับ รูปโปรไฟล์ผู้ใช้) -->
    <div class="relative flex items-center justify-center mb-6">
      <!-- วงแหวน Animation หมุนรอบๆ -->
      <div id="loading-spinner" class="animate-spin inline-block w-24 h-24 border-[3px] border-emerald-500 border-t-transparent rounded-full" role="status"></div>

      <!-- กรอบใส่รูปภาพ -->
      <div class="absolute flex items-center justify-center w-16 h-16">
        <img id="display-avatar" src="https://ebudkvylrtkzmaaipwsv.supabase.co/storage/v1/object/public/user-images/Ue6d21e868a3f695dda1a1643721c5372/1766835776687.jpeg"
          alt="Avatar" class="w-full h-full object-contain rounded-full transition-all duration-500">
      </div>
    </div>

    <!-- ข้อความหลักและข้อความย่อย -->
    <div id="status-text-main" class="text-gray-800 font-semibold text-lg animate-pulse">กำลังเตรียมระบบ...</div>
    <div id="status-text-sub" class="text-gray-400 text-sm mt-2 font-light flex items-center justify-center gap-2">
      <!-- จุด Loading จะแทรกตรงนี้ -->
    </div>

    <!-- Error Screen (ซ่อนไว้เป็นค่าเริ่มต้น) -->
    <div id="error-screen" class="hidden mt-4 p-4 bg-red-50 border border-red-100 rounded-xl">
      <p id="error-message" class="text-red-600 text-sm font-medium"></p>
    </div>
  </div>

  <script>
    const LIFF_ID = "2010419567-tIgtTpB2"; // ใส่ LIFF ID ของคุณที่นี่
    const REDIRECT_URL_STORAGE_KEY = "fin-liff-redirect-url";
    const DEFAULT_REDIRECT_URL = "https://ichanachock.github.io/LifeInsurance-System/";

    function getRedirectUrlFromQuery() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('url');
    }

    function rememberRedirectUrl() {
      const redirectUrl = getRedirectUrlFromQuery();
      if (redirectUrl && redirectUrl.trim() !== '') {
        sessionStorage.setItem(REDIRECT_URL_STORAGE_KEY, redirectUrl);
      }
      return redirectUrl;
    }

    function getRedirectUrl() {
      return getRedirectUrlFromQuery() || sessionStorage.getItem(REDIRECT_URL_STORAGE_KEY) || DEFAULT_REDIRECT_URL;
    }

    // ฟังก์ชันแจ้งเตือนด้วย SweetAlert2 (แบบ Toast มุมขวาบน)
    function showToast(message, icon = 'info') {
      if (typeof Swal !== 'undefined') {
        Swal.fire({
          toast: true,
          position: 'top-end',
          showConfirmButton: false,
          timer: 2500,
          timerProgressBar: true,
          icon,
          title: message,
          background: '#fff',
          color: '#2d2d2d',
          customClass: { popup: 'shadow-lg rounded-xl border border-gray-100' }
        });
      } else {
        console[icon === 'error' ? 'error' : 'log'](message);
      }
    }

    // ฟังก์ชันแสดง Alert สวยๆ กรณีไม่พบ URL หรือเกิด Error ร้ายแรง
    function showCustomAlert(title, text, icon = 'error') {
      if (typeof Swal !== 'undefined') {
        Swal.fire({
          title: title,
          text: text,
          icon: icon,
          confirmButtonText: 'ปิดหน้าต่างนี้',
          confirmButtonColor: '#10b981', // สี Emerald เขียวสวยงามเข้ากับธีม
          background: '#fff',
          customClass: {
            popup: 'rounded-3xl shadow-2xl p-6 border border-gray-100',
            title: 'font-semibold text-xl text-gray-800',
            htmlContainer: 'text-sm text-gray-500 font-light mt-2',
            confirmButton: 'rounded-xl px-6 py-2.5 font-medium text-sm'
          },
          buttonsStyling: true,
          allowOutsideClick: false, // บังคับให้กดปุ่มเท่านั้น
          allowEscapeKey: false
        }).then((result) => {
          if (result.isConfirmed) {
            // ปิดหน้าต่าง LIFF ทันทีเมื่อผู้ใช้กดตกลง
            if (liff.isInClient()) {
              liff.closeWindow();
            } else {
              window.close();
            }
          }
        });
      } else {
        alert(`${title}: ${text}`);
      }
    }

    // ฟังก์ชันอัปเดตสถานะหน้าจอ
    function renderLoading(mainText, subText = 'กรุณารอสักครู่...') {
      const main = document.getElementById('status-text-main');
      const sub = document.getElementById('status-text-sub');
      const errorScreen = document.getElementById('error-screen');

      if (main) {
        main.textContent = mainText;
        main.classList.add('animate-pulse');
      }
      if (sub) {
        sub.innerHTML = `
          <span class="relative flex h-2.5 w-2.5">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
          </span>
          ${subText}
        `;
      }
      if (errorScreen) errorScreen.classList.add('hidden');
    }

    // ฟังก์ชันแสดงหน้าจอยินดีต้อนรับ (แสดงรูปและชื่อผู้ใช้ LINE)
    function renderWelcomeScreen(displayName, pictureUrl) {
      const main = document.getElementById('status-text-main');
      const sub = document.getElementById('status-text-sub');
      const avatar = document.getElementById('display-avatar');
      const spinner = document.getElementById('loading-spinner');

      // 1. เปลี่ยนรูปเป็นรูปโปรไฟล์ LINE และเปลี่ยนการแสดงผลเป็นแบบเต็มวงกลม (Object-Cover)
      if (pictureUrl && avatar) {
        avatar.src = pictureUrl;
        avatar.classList.remove('object-contain');
        avatar.classList.add('object-cover', 'border-2', 'border-emerald-500', 'p-0.5');
      }

      // 2. หยุดการหมุนของ Spinner และเปลี่ยนเป็นวงแหวนสีเขียวคงที่เพื่อความคลีน
      if (spinner) {
        spinner.classList.remove('animate-spin', 'border-t-transparent');
        spinner.classList.add('border-emerald-500', 'bg-emerald-50');
      }

      // 3. แสดงชื่อผู้ใช้พร้อมคำยินดีต้อนรับ (ปิดเอฟเฟกต์กะพริบออกเพื่อให้จังหวะนี้ดูนิ่งและพรีเมียมขึ้น)
      if (main) {
        main.classList.remove('animate-pulse');
        main.innerHTML = `ยินดีต้อนรับคุณ <span class="text-emerald-600 font-bold">${displayName}</span>`;
      }

      // 4. เปลี่ยนข้อความด้านล่างเป็นสถานะเข้าสู่ระบบสำเร็จ
      if (sub) {
        sub.innerHTML = `<span class="text-emerald-500 font-medium">✓ เข้าสู่ระบบสำเร็จแล้ว</span>`;
      }
    }

    // ฟังก์ชันแสดงข้อผิดพลาดบนหน้าจอ
    function showError(message) {
      const errorScreen = document.getElementById('error-screen');
      const errorMessage = document.getElementById('error-message');
      const sub = document.getElementById('status-text-sub');

      if (errorMessage) errorMessage.textContent = message;
      if (errorScreen) errorScreen.classList.remove('hidden');
    }

    // ฟังก์ชันเช็คสถานะการเป็นเพื่อน
    async function checkFriendshipStatus() {
      try {
        const friendship = await liff.getFriendship();
        if (!friendship.friendFlag) {
          if (typeof liff.requestFriendship === 'function') {
            await liff.requestFriendship();
            const verify = await liff.getFriendship();
            if (verify.friendFlag) {
              showToast('ขอบคุณที่เพิ่มเราเป็นเพื่อนครับ!', 'success');
            }
          }
        }
      } catch (err) {
        console.warn("Friendship check error:", err);
      }
    }

    // ฟังก์ชันหลัก
    async function initApp() {
      renderLoading('กำลังตรวจสอบสภาพแวดล้อม...');

      try {
        rememberRedirectUrl();

        // 1. Init LIFF
        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: true
        });
        await liff.ready;

        // 2. เช็คการ Login
        if (!liff.isLoggedIn()) {
          renderLoading('กำลังพาไปหน้าเข้าสู่ระบบ...');
          liff.login({ redirectUri: window.location.href });
          return;
        }

        // 3. เช็คสถานะเพิ่มเพื่อน
        renderLoading('ตรวจสอบสถานะสมาชิก...');
        await checkFriendshipStatus();

        // 4. ดึงข้อมูล Profile ผู้ใช้งาน
        const profile = await liff.getProfile();

        // 5. ดึง Path ปลายทางจาก Parameter 'url'
        const redirectUrl = getRedirectUrl();

        // ⚠️ จุดสำคัญ: ตรวจสอบกรณีไม่มีระบุ url parameter มา
        if (!redirectUrl || redirectUrl.trim() === '') {
          showError('ไม่พบ URL ปลายทางในระบบ (Missing Redirect URL)');
          showCustomAlert(
            'ไม่สามารถเข้าสู่ระบบได้',
            'ลิงก์นี้ไม่มีการระบุ URL ปลายทาง กรุณาติดต่อผู้ดูแลระบบเพื่อตรวจสอบอีกครั้ง',
            'warning'
          );
          return; // สั่งหยุดทำงาน ไม่ทำการ Redirect ใดๆ ทั้งสิ้น
        }

        // 6. เปลี่ยนเป็นหน้าจอ Welcome แสดงรูปโปรไฟล์และชื่อจริงจาก LINE
        showToast('ยืนยันตัวตนสำเร็จ', 'success');
        renderWelcomeScreen(profile.displayName, profile.pictureUrl);

        // 7. หน่วงเวลาเล็กน้อย (2.5 วินาที) ให้ผู้ใช้เห็นหน้าจอ Welcome ก่อนส่งตัวไปปลายทาง
        setTimeout(() => {
          const targetPath = decodeURIComponent(redirectUrl);
          sessionStorage.removeItem(REDIRECT_URL_STORAGE_KEY);
          console.log(`Redirecting to: ${targetPath}`);

          // ใช้ location.replace เพื่อความปลอดภัยและไม่ให้ย้อนกลับมาหน้าโหลดดิ้งได้
          window.location.replace(targetPath);
        }, 2500);

      } catch (err) {
        console.error("Init Error:", err);
        showError('ไม่สามารถเชื่อมต่อระบบได้: ' + err.message);
        showCustomAlert(
          'เกิดข้อผิดพลาดในการเริ่มต้นระบบ',
          err.message || 'กรุณาลองใหม่อีกครั้งในภายหลัง',
          'error'
        );
      }
    }

    document.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>
</html>
